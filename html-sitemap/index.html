<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Sitemap (with Live Search & Category Filter) | Demo by Dida</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        
    <style>
* {box-sizing: border-box;}
body{background-color: #0f1116; color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;}
.top-nav{margin: 0 auto;align-items: center; padding: 15px 20px;}
header{width: 100%; padding: 40px 20px; text-align: center; background: linear-gradient(180deg, #1a1d24 0%, #0f1116 100%); border-bottom: 1px solid #30363d;}
header h1{margin: 0; font-size: 2rem; letter-spacing: -1px; color: #58a6ff;}
header p{color: #8b949e; margin-top: 10px;}
.main-content{width: 90%; max-width: 1000px; margin: 40px 0; background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
footer{margin-top: auto; padding: 20px; color: #484f58; font-size: 0.8rem;}
.back-btn{background:none;border:1px solid #30363d;color:#c9d1d9;padding:8px 12px;border-radius:6px;cursor:pointer;text-decoration:none;font-size:0.9rem;transition:0.2s;}
.back-btn:hover{border-color: #58a6ff; color:#58a6ff;}
    </style>
</head>
<body>

    <header>
        <h1>Daily Release Schedule</h1>
        <p>Live Demo for Blogger Integration</p>
    </header>
<nav class="top-nav">
    <a class="back-btn" href="../index.html">
    <i class="fa-solid fa-left-long"></i> Back to Script Lab
    </a>
</nav>

    <div class="main-content">
        <div class="sm-topbar">
  <div class="sm-filters">
    <select id="sort">
      <option value="published">Latest Posts</option>
      <option value="updated">Latest Updated</option>
    </select>

    <select id="category">
      <option value="">All</option>
    </select>
  </div>

  <div class="sm-search-wrapper">
    <input class="sm-search" id="search" placeholder="Search posts..." type="search"/>
    <div class="sm-search-icon">
      <svg viewBox="0 0 512 512"><path d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z" fill="currentColor"/></svg>
    </div>
  </div>
</div>

<div class="sm-count" id="count">Loading...</div>
<div class="sm-posts" id="posts"></div>
<div id="load-more-container" style="text-align:center; padding: 20px;">
  <button id="load-more-btn" class="sm-btn-more">Load More</button>
</div>

<script>//<![CDATA[
const blogURL = "https://omniotakuu.blogspot.com";
const maxLabels = 20;
const postsPerLoad = 50;

let nextPage = 1;
let currentLabel = "";
let currentSort = "published";
let searchQuery = "";

async function loadLabels() {
  const res = await fetch(blogURL + "/feeds/posts/default?alt=json&max-results=0");
  const data = await res.json();

  let labels = data.feed.category?.map(c => c.term) || [];
  labels = labels.slice(0, maxLabels);

  const select = document.getElementById("category");

  labels.forEach(label => {
    const opt = document.createElement("option");
    opt.value = label;
    opt.textContent = label;
    select.appendChild(opt);
  });
}

async function loadPosts(reset = false) {
  const loadBtn = document.getElementById("load-more-btn");
  let url = blogURL + "/feeds/posts/default";

  if (currentLabel) url += "/-/" + currentLabel;
  url += `?alt=json&max-results=${postsPerLoad}&start-index=${(nextPage - 1) * postsPerLoad + 1}`;
  if (currentSort === "updated") url += "&orderby=updated";

  const res = await fetch(url);
  const data = await res.json();
  const totalResults = data.feed.openSearch$totalResults.$t;
  const container = document.getElementById("posts");

  if (reset) {
    container.innerHTML = "";
    loadBtn.innerText = "Load More"; 
    loadBtn.disabled = false;
  }

  let entries = data.feed.entry || [];

if (searchQuery) {
    const query = searchQuery.toLowerCase();
    entries = entries.filter(e => {
      const title = e.title.$t.toLowerCase();
      const labels = e.category ? e.category.map(cat => cat.term.toLowerCase()) : [];
      return title.includes(query) || labels.some(l => l.includes(query));
    });
    
    document.getElementById("count").innerText = `${entries.length} results matching "${searchQuery}"`;
  } else {
    document.getElementById("count").innerText = `${totalResults} total posts found`;
  }
  
  if (entries.length < postsPerLoad) {
    loadBtn.innerText = "No More Posts";
    loadBtn.disabled = true; 
    loadBtn.style.opacity = "0.5";
    loadBtn.style.cursor = "default";
  }

  entries.forEach(entry => {
    const link = entry.link.find(l => l.rel === "alternate").href;

let thumb = "";
if (entry.media$thumbnail) {
    thumb = entry.media$thumbnail.url;
} else if (entry.content && entry.content.$t.includes("<img")) {
    const srcMatch = entry.content.$t.match(/src=["']([^"']+)["']/);
    thumb = srcMatch ? srcMatch[1] : "";
}

if (thumb !== "") {
    thumb = thumb.replace(/\/s[0-9]+(-c)?\//, "/s1600/");
} else {
    thumb = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTxYv-Ua7D6ImswxKjjbUDpy8JcZ6qZKuCrIA&s";
}

 let snippet="";entry.summary?snippet=entry.summary.$t:entry.content&&(snippet=entry.content.$t.replace(/<[^>]*>?/gm,"")),snippet=snippet.substring(0,250)+"...";

const date=new Date(entry.published.$t).toLocaleDateString(),div=document.createElement("div");div.className="sm-post",div.innerHTML=`\n  <img alt="${entry.title.$t}" class="sm-thumb" src="${thumb}">\n  <div class="sm-info">\n    <div class="sm-title"><a aria-label="${entry.title.$t}" href="${link}" target="_self">${entry.title.$t}</a></div>\n    <div class="sm-snippet" style="font-size: 13px; color: #666; margin-bottom: 4px;">${snippet}</div>\n    <div class="sm-date">${date}</div>\n  </div>\n`;

    container.appendChild(div);
  });

  nextPage++;
}

document.getElementById("sort").onchange = function() {
  currentSort = this.value;
  nextPage = 1;
  loadPosts(true);
};

document.getElementById("category").onchange = function() {
  currentLabel = this.value;
  nextPage = 1;
  loadPosts(true);
};

document.getElementById("search").oninput = function() {
  searchQuery = this.value;
  nextPage = 1;
  loadPosts(true);
};

document.getElementById("load-more-btn").onclick = function() {
  if (this.disabled) return; 

  const originalText = this.innerText;
  this.innerText = "Loading..."; 
  
  loadPosts().then(() => {
    if (!this.disabled) {
      this.innerText = "Load More";
    }
  });
};

loadLabels();
loadPosts(true);
//]]></script>

<style>
:root{--sm-bg:#ffffff;--sm-text:#1e293b;--sm-card:#e8e8e8;--sm-accent:#4f46e5;--sm-border:#ccc;}body.dark-mode{--sm-bg:#0f0f0f;--sm-text:#eee;--sm-card:#1a1a1a;--sm-accent:#818cf8;--sm-border:#282828;}.sm-topbar{display:flex;gap:10px;flex-wrap:wrap;}.sm-topbar select,.sm-topbar input{padding:8px;border-radius:6px;border:1px solid var(--sm-border);background:var(--sm-card);color:var(--sm-text);}.sm-search{flex:1;}@media (max-width:768px){.sm-topbar{flex-direction:column;}.sm-filters{display:flex;gap:10px;}.sm-search{width:100%;}.sm-search-wrapper{width:100%;};}@media (max-width:650px){.sm-snippet{display:none!important;}.sm-title a{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis;line-height:1.4;};}.sm-count{padding:10px;font-size:14px;opacity:0.8;}.sm-posts{overflow-y:auto;}.sm-post{display:flex;gap:12px;margin-bottom:10px;border-radius:10px;}.sm-thumb{width:120px;height:70px;flex-shrink:0;border-radius:6px;object-fit:cover;}.sm-info{flex:1;}.sm-title{font-weight:bold;margin-bottom:5px;}.sm-date{font-size:12px;opacity:0.7;color:var(--sm-text);}.sm-snippet{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis;line-height:1.4;margin:5px 0;}.sm-search-wrapper{position:relative;flex:1;display:flex;align-items:center;}.sm-search{width:100%;padding-left:35px !important;}.sm-search-icon{position:absolute;left:10px;width:16px;height:16px;color:var(--sm-text);opacity:0.5;pointer-events:none;display:flex;align-items:center;justify-content:center;}.sm-search-icon svg{width:100%;height:100%;}.sm-search:focus + .sm-search-icon{opacity:1;color:var(--sm-accent);}.sm-search-icon{transition:all 0.2s ease;}.sm-btn-more{padding:10px 25px;background-color:var(--sm-accent);color:#white;border:none;border-radius:6px;cursor:pointer;font-weight:bold;transition:opacity 0.2s;}.sm-btn-more:hover{opacity:0.8;}.sm-posts{overflow-y:visible;}
</style>
</body>
</html>
