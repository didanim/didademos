<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime List Sitemap | Demo by Dida</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        
    <style>
        :root {
            --bg-dark: #f0f2f5;
            --card-bg: #ffffff;
            --accent-blue: #0969da;
            --text-main: #1f2328;
            --text-dim: #57606a;
            --border: #d0d7de;
            --header-grad: radial-gradient(circle at top, #ffffff 0%, #f0f2f5 100%);
        }

        [data-theme="dark"] {
            --bg-dark: #0d1117;
            --card-bg: #161b22;
            --accent-blue: #58a6ff;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --border: #30363d;
            --header-grad: radial-gradient(circle at top, #1c2128 0%, #0d1117 100%);
        }
* {box-sizing: border-box;}
body{background-color: var(--bg-dark); color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;}
.top-nav{width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: var(--card-bg); border-bottom: 1px solid var(--border);}
.back-btn, .theme-toggle{background: none; border: 1px solid var(--border); color: var(--text-main); padding: 8px 12px; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 0.9rem; transition: 0.2s;}
.back-btn:hover, .theme-toggle:hover{border-color: var(--accent-blue); color: var(--accent-blue);}
header{width: 100%; padding: 40px 20px; text-align: center; background: linear-gradient(180deg, #1a1d24 0%, #0f1116 100%); border-bottom: 1px solid #30363d;}
header h1{margin: 0; font-size: 2rem; letter-spacing: -1px; color: #58a6ff;}
header p{color: #8b949e; margin-top: 10px;}
.main-content{width: 95%; max-width: 1000px; margin: 50px 0; background: var(--bg-dark); padding: 0; border-radius: 12px; flex-shrink: 0;}
footer{padding: 10vh 0; color: var(--text-dim); font-size: 0.8rem;}
        
:root{--cr-bg: #ffffff; --cr-text: #000000; --cr-subtext: #666666; --cr-border: #e0e0e0; --cr-orange: #f47521;}
[data-theme="dark"]{--cr-bg: #141519; --cr-text: #ffffff; --cr-subtext: #a0a0a0; --cr-border: #23252b;}
:root{--cr-bg: #ffffff; --cr-text: #000000; --cr-subtext: #666666; --cr-border: #e0e0e0; --cr-orange: #f47521;}
[data-theme="dark"]{--cr-bg: #141519; --cr-text: #ffffff; --cr-subtext: #a0a0a0; --cr-border: #23252b;}
#anime-list-display {content-visibility: auto; contain-intrinsic-size: 1000px;}
#a-top{padding: 10px;background: var(--cr-bg);}
#a-top.sticky{position: fixed; top: 0; left: 0; width: 100%; overflow: hidden; box-shadow: 0 1px 5px 1px rgba(0, 0, 0, 0.4); z-index: 1;}
#abjad-filted{display: flex; flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; scrollbar-width: none; -ms-overflow-style: none; width: 100%; box-sizing: border-box; margin: 0; padding: 0; align-items: center; justify-content: center;}
#abjad-filted a{color: var(--cr-text); text-decoration: none; font-weight: 700; padding: 7px 0; font-size: 1rem; width: 35px; margin: 0px 5px 5px 0px; text-align: center;}
#abjad-filted a.active{color: var(--cr-orange); border-bottom: 2px solid var(--cr-orange); transition: all 0.3s ease;}
.abjad-section{margin: 40px auto; max-width: 1200px; padding: 0 15px; scroll-margin-top: 80px;}
.abjad-header{font-size: 2rem; font-weight: 900; color: var(--cr-text); border-bottom: 2px solid var(--cr-orange); margin-bottom: 20px;}
.anime-item{display: flex; gap: 20px; padding: 10px 0; text-decoration: none;}
.anime-item:hover{background: rgba(244, 117, 33, 0.05);}
.anime-thumb{flex:0 0 100px; width:100px; height:150px; border-radius:4px; object-fit:cover; background-color:var(--cr-border); display: block;}
.anime-details{flex: 1; display: flex; flex-direction: column; justify-content: flex-start; overflow: hidden;}
.anime-title-text{color: var(--cr-text); font-size: 1.2rem; font-weight: 700; margin: 10px 0;}
.anime-summary{color: var(--cr-subtext); font-size: 0.9rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;}
@media (max-width: 600px){.anime-summary{display: none;}
.anime-thumb{flex: 0 0 80px;}
.anime-title-text{font-size: 1rem;}
}
@media (max-width: 768px) {
    #abjad-filted a {
        padding: 10px 12px;
        font-size: 0.9rem;
    }
}
    </style>

     <script>
        const themeBtn = document.getElementById('theme-btn');
        const htmlElement = document.documentElement;
        
        const savedTheme = localStorage.getItem('theme') || 'light';
        htmlElement.setAttribute('data-theme', savedTheme);
        updateIcon(savedTheme);

        themeBtn.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon(newTheme);
        });

        function updateIcon(theme) {
            themeBtn.innerHTML = theme === 'light' 
                ? '<i class="fa-solid fa-sun"></i> Light' 
                : '<i class="fa-solid fa-moon"></i> Dark';
        }
    </script>
