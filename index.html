<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dida's Script Lab | Project Demos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
:root{--bg-dark: #0d1117; --card-bg: #161b22; --accent-blue: #58a6ff; --text-main: #c9d1d9; --text-dim: #8b949e; --border: #30363d;}
* {box-sizing: border-box;}
body{background-color: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 0; margin: 0; display: flex; flex-direction: column; min-height: 100vh;}
header{padding: 60px 20px; text-align: center; border-bottom: 1px solid var(--border); background: radial-gradient(circle at top, #1c2128 0%, #0d1117 100%);}
header h1{margin: 0; font-size: 2.5rem; color: var(--accent-blue); letter-spacing: -1px;}
header p{color: var(--text-dim); font-size: 1.1rem; margin-top: 10px;}
.container{max-width: 1200px; margin: 40px auto; padding: 0 20px; flex-grow: 1;width: 100%;}
.project-grid{display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;}
.card{background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 24px; transition: transform 0.2s, border-color 0.2s; text-decoration: none; display: block;}
.card:hover{transform: translateY(-5px); border-color: var(--accent-blue); background: #1c2128;}
.card i{font-size: 1.5rem; color: var(--accent-blue); display: block;margin-right: 5px;}
.card h2{margin: 0; font-size: 1.25rem; color: #ffffff;display: flex; justify-content: center;}
footer{text-align: center; padding: 40px 20px; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--text-dim);}
@media (max-width: 600px){header h1{font-size: 1.8rem;}
}
    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-wand-magic-sparkles"></i> Dida's Script Lair</h1>
        <p>Live technical demos for my Blogger projects</p>
    </header>
    
    <div class="container">
        <div class="project-grid">
            
            <a href="daily-release-schedule/index.html" class="card">
                <h2><i class="fa-solid fa-calendar-days"></i>Daily Release Schedule</h2>
            </a>

            <a href="anime-list-sitemap/index.html" class="card">
                <h2><i class="fa-solid fa-sitemap"></i>Anime List Sitemap</h2>
            </a>

        </div>
    </div>

    <footer>
        &copy; 2026 Dida • Built with HTML/CSS & GitHub Pages
    </footer>
</body>
</html>
