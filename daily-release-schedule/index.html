<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Release Schedule | Demo</title>
    
    <link rel="stylesheet" href="daily-release-schedule/style.css">
    
    <style>
 body{background-color:#0f1116;color:#ffffff;font-family:'Inter',sans-serif;margin:0;padding:0;display:flex;flex-direction:column;align-items:center;}header{width:100%;padding:40px 20px;text-align:center;background:linear-gradient(180deg,#1a1d24 0%,#0f1116 100%);border-bottom:1px solid #30363d;}header h1{margin:0;font-size:2rem;letter-spacing:-1px;color:#58a6ff;}header p{color:#8b949e;margin-top:10px;}.main-content{width:90%;max-width:1000px;margin:40px 0;background:#161b22;padding:20px;border-radius:12px;border:1px solid #30363d;box-shadow:0 10px 30px rgba(0,0,0,0.5);}footer{margin-top:auto;padding:20px;color:#484f58;font-size:0.8rem;}
    </style>
</head>
<body>

    <header>
        <h1>Daily Release Schedule</h1>
        <p>Live Demo for Blogger Integration</p>
    </header>

    <div class="main-content">
        <div class="schedules-container">
            <div class="schedules__nav">
                <div class="schedules__day" data-day="sunday">Sun</div>
                <div class="schedules__day" data-day="monday">Mon</div>
                <div class="schedules__day" data-day="tuesday">Tue</div>
                <div class="schedules__day" data-day="wednesday">Wed</div>
                <div class="schedules__day" data-day="thursday">Thu</div>
                <div class="schedules__day" data-day="friday">Fri</div>
                <div class="schedules__day" data-day="saturday">Sat</div>
            </div>

            <div id="entries-sunday" class="schedules__entries"></div>
            <div id="entries-monday" class="schedules__entries"></div>
            <div id="entries-tuesday" class="schedules__entries"></div>
            <div id="entries-wednesday" class="schedules__entries"></div>
            <div id="entries-thursday" class="schedules__entries"></div>
            <div id="entries-friday" class="schedules__entries"></div>
            <div id="entries-saturday" class="schedules__entries"></div>
        </div>
    </div>

    <footer>
        &copy; 2026 Script Demo Preview • Hosted on GitHub Pages
    </footer>

    <script src="https://github.com/didanim/didademos/blob/6c982aa31f6d5342851bad16de9fdbf447cea92e/daily-release-schedule/script.js"></script>
</body>
</html>
